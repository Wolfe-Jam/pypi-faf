name: Refresh pypi.faf.one

on:
  schedule:
    - cron: "0 4 * * *"  # daily 04:00 UTC
  push:
    branches: [main]
    paths:
      - "build/**"
      - "templates/**"
      - "packages.yml"
      - ".github/workflows/refresh.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Sync deps
        run: uv sync

      - name: Render docs/index.html
        run: uv run python build/render.py

      - name: Commit if changed
        run: |
          git config user.name "pypi-faf-bot"
          git config user.email "bot@faf.one"
          # Commit the regenerated page, the high-water-mark file (auditable
          # floor — never decreases), and the sitemap (lastmod tracks today).
          if [ -n "$(git status --porcelain docs/index.html docs/sitemap.xml build/last-totals.json)" ]; then
            git add docs/index.html docs/sitemap.xml build/last-totals.json
            git commit -m "chore: refresh docs/index.html ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "no changes"
          fi
